<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 576px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #09090B;
    position: relative;
  }

  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 40%, rgba(99, 102, 241, 0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 30%, rgba(139, 92, 246, 0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 85%, rgba(236, 72, 153, 0.1) 0%, transparent 45%),
      radial-gradient(ellipse at 10% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
  }

  .grid-pattern {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .top-line {
    position: absolute;
    top: 0;
    left: 5%;
    right: 5%;
    height: 3px;
    background: linear-gradient(90deg, transparent, #ef4444, #6366f1, #8b5cf6, #ec4899, #06b6d4, transparent);
  }

  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 15%;
    right: 15%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #6366f1, transparent);
  }

  .orb { position: absolute; border-radius: 50%; filter: blur(70px); }
  .orb-1 { width: 250px; height: 250px; background: #ef4444; opacity: 0.15; top: -80px; right: 80px; }
  .orb-2 { width: 200px; height: 200px; background: #8b5cf6; opacity: 0.15; bottom: -60px; left: 60px; }
  .orb-3 { width: 180px; height: 180px; background: #06b6d4; opacity: 0.12; bottom: 30px; right: 30px; }
  .orb-4 { width: 160px; height: 160px; background: #ec4899; opacity: 0.1; top: 40px; left: -30px; }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 30px 50px;
    text-align: center;
  }

  .logo-area { margin-bottom: 20px; }
  .logo-area img { height: 110px; filter: invert(1) brightness(1.15); }

  .tagline {
    font-size: 22px;
    color: #d4d4d8;
    font-weight: 500;
    margin-bottom: 30px;
    letter-spacing: 0.3px;
  }

  .stats-row {
    display: flex;
    gap: 28px;
    margin-bottom: 30px;
  }

  .stat-card {
    padding: 16px 28px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    text-align: center;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: #71717a;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .services-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .service-pill {
    padding: 8px 20px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    font-size: 13px;
    color: #a1a1aa;
    font-weight: 600;
  }

  .bottom-text {
    font-size: 14px;
    color: #3f3f46;
    font-weight: 500;
    letter-spacing: 1px;
  }

  .bottom-text a {
    color: #6366f1;
    text-decoration: none;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="grid-pattern"></div>
  <div class="top-line"></div>
  <div class="bottom-line"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>

  <div class="content">
    <div class="logo-area">
      <img src="/logo-nav.png" alt="NERVÜR" />
    </div>

    <div class="tagline">Technologies de croissance pour les PME</div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" style="color: #8b5cf6">100%</div>
        <div class="stat-label">Données réelles</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color: #06b6d4">24/7</div>
        <div class="stat-label">Monitoring</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color: #ec4899">IA</div>
        <div class="stat-label">Recommandations</div>
      </div>
    </div>

    <div class="services-row">
      <div class="service-pill">Création de sites web</div>
      <div class="service-pill">Référencement SEO</div>
      <div class="service-pill">Outils sur mesure</div>
      <div class="service-pill">Agence digitale</div>
    </div>

    <div class="bottom-text"><a>nervur.fr</a></div>
  </div>
</body>
</html>
