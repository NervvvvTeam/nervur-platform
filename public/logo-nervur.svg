<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 64" fill="none">
  <defs>
    <linearGradient id="nBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="nGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="50%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="textShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0e7ff">
        <animate attributeName="stop-color" values="#e0e7ff;#FAFAFA;#e0e7ff" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#FAFAFA">
        <animate attributeName="stop-color" values="#FAFAFA;#c7d2fe;#FAFAFA" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#e0e7ff">
        <animate attributeName="stop-color" values="#e0e7ff;#FAFAFA;#e0e7ff" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- N Icon container -->
  <rect x="3" y="5" width="54" height="54" rx="15" fill="url(#nBg)" opacity="0.95"/>
  <rect x="3" y="5" width="54" height="54" rx="15" fill="none" stroke="#a5b4fc" stroke-width="0.5" opacity="0.3"/>

  <!-- N letter with glow -->
  <g filter="url(#glow)">
    <path d="M19 45V19L41 45V19" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>
  </g>

  <!-- Subtle shine line on icon -->
  <line x1="8" y1="10" x2="18" y2="10" stroke="white" stroke-width="1" opacity="0.15" stroke-linecap="round">
    <animate attributeName="opacity" values="0.05;0.2;0.05" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- NERVÜR text with animated shine -->
  <text x="72" y="44" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="37" font-weight="800" letter-spacing="3" fill="url(#textShine)">NERV&#220;R</text>

  <!-- Subtle underline accent -->
  <line x1="72" y1="52" x2="180" y2="52" stroke="url(#nBg)" stroke-width="2" stroke-linecap="round" opacity="0.4">
    <animate attributeName="x2" values="72;180;72" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite"/>
  </line>
</svg>